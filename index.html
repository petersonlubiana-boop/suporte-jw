<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPORTE JW</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Nunito:wght@400;500;600;700&display=swap');

  :root {
    --bg:        #0b0f1a;
    --surface:   #111827;
    --surface2:  #1a2235;
    --border:    #1e2d4a;
    --blue:      #4a90d9;
    --blue-soft: #6aaee8;
    --blue-dim:  #2c5f94;
    --text:      #c8d8f0;
    --muted:     #4a6080;
    --white:     #e8f0ff;
    --accent:    #7bb8f0;
    --green:     #3a8a5a;
    --green-soft:#5aaa7a;
    --purple:    #7a6aaa;
    --purple-soft:#9a8aca;
    --orange:    #c87a30;
    --orange-soft:#e8a050;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(42,80,140,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(30,60,110,0.15) 0%, transparent 60%);
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 20px 70px;
  }

  header { text-align: center; padding: 48px 0 28px; }

  .logo-wrap {
    display: inline-flex; align-items: center; justify-content: center;
    width: 58px; height: 58px;
    background: linear-gradient(135deg, #1a3a6a, #0f2040);
    border: 1.5px solid var(--border); border-radius: 16px;
    font-size: 26px; margin-bottom: 18px;
    box-shadow: 0 0 28px rgba(74,144,217,0.18);
  }

  h1 {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(2rem, 6vw, 2.8rem);
    font-weight: 700; color: var(--white); letter-spacing: 0.2em;
  }

  .subtitle {
    font-size: 11.5px; color: var(--muted);
    letter-spacing: 0.22em; text-transform: uppercase; margin-top: 8px;
  }

  .glow-line {
    width: 48px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--blue), transparent);
    margin: 20px auto 0; border-radius: 2px;
  }

  .container { width: 100%; max-width: 660px; }

  .search-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 26px 24px; margin-bottom: 18px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .search-label {
    font-size: 13px; color: var(--muted); font-weight: 500;
    letter-spacing: 0.05em; margin-bottom: 6px; display: block;
  }

  .search-hint {
    font-size: 11.5px; color: var(--muted); margin-bottom: 14px;
    opacity: 0.7;
  }

  .input-row { display: flex; gap: 10px; }

  input[type="text"] {
    flex: 1; background: var(--bg); border: 1.5px solid var(--border);
    color: var(--white); font-family: 'Nunito', sans-serif;
    font-size: 15px; padding: 13px 18px; border-radius: 12px; outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  input[type="text"]:focus {
    border-color: var(--blue-dim);
    box-shadow: 0 0 0 3px rgba(74,144,217,0.12);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  button.btn-buscar {
    background: linear-gradient(135deg, var(--blue-dim), #1e4a80);
    color: var(--white); border: 1px solid rgba(74,144,217,0.3);
    border-radius: 12px; padding: 13px 22px;
    font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }

  button.btn-buscar:hover {
    background: linear-gradient(135deg, var(--blue), var(--blue-dim));
    box-shadow: 0 0 16px rgba(74,144,217,0.3);
  }

  button.btn-buscar:active { transform: scale(0.97); }
  button.btn-buscar:disabled { opacity: 0.4; cursor: not-allowed; }

  .loading { display: none; text-align: center; padding: 48px 0; }
  .loading.visible { display: block; }

  .spinner {
    width: 38px; height: 38px;
    border: 2.5px solid var(--border); border-top-color: var(--blue);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-family: 'Lora', serif; font-style: italic; color: var(--muted); font-size: 1rem; }

  .error-box {
    display: none; background: rgba(192,80,80,0.1);
    border: 1px solid rgba(192,80,80,0.3); border-radius: 12px;
    padding: 14px 18px; color: #e08888; font-size: 13.5px;
    margin-bottom: 16px;
  }
  .error-box.visible { display: block; }

  /* ── Result card ── */
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 30px 26px; display: none;
    animation: fadeUp 0.4s ease; box-shadow: 0 4px 32px rgba(0,0,0,0.3);
  }

  .result-card.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .r-eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
  .r-title { font-family: 'Lora', serif; font-size: 1.5rem; color: var(--white); margin-bottom: 22px; line-height: 1.3; }

  /* Scripture block */
  .scripture {
    border-left: 2px solid var(--blue-dim); padding: 16px 20px;
    background: rgba(30,60,110,0.25); border-radius: 0 12px 12px 0; margin-bottom: 22px;
  }

  .scripture-text { font-family: 'Lora', serif; font-style: italic; font-size: 1.05rem; color: #b0c8e8; line-height: 1.78; }
  .scripture-ref { display: block; margin-top: 10px; font-size: 11.5px; color: var(--blue-soft); letter-spacing: 0.1em; font-weight: 700; }

  /* Section labels */
  .section-label {
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: 700; margin-bottom: 12px;
  }

  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-label.blue  { color: var(--accent); }
  .section-label.green { color: var(--green-soft); }
  .section-label.purple{ color: var(--purple-soft); }
  .section-label.orange{ color: var(--orange-soft); }

  .section-text {
    font-size: 14.5px; line-height: 1.82; margin-bottom: 22px;
  }

  .section-text.blue   { color: #8aaed0; }
  .section-text.green  { color: #80c8a0; }
  .section-text.purple { color: #b0a0e0; }
  .section-text.orange { color: #d0a070; }

  /* EIA boxes */
  .eia-box {
    border-radius: 12px; padding: 18px 20px; margin-bottom: 14px;
    border: 1px solid;
  }

  .eia-box.explicar {
    background: rgba(58,138,90,0.1); border-color: rgba(58,138,90,0.3);
  }

  .eia-box.ilustrar {
    background: rgba(122,106,170,0.1); border-color: rgba(122,106,170,0.3);
  }

  .eia-box.aplicar {
    background: rgba(200,122,48,0.1); border-color: rgba(200,122,48,0.3);
  }

  .eia-title {
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }

  .eia-title.explicar { color: var(--green-soft); }
  .eia-title.ilustrar { color: var(--purple-soft); }
  .eia-title.aplicar  { color: var(--orange-soft); }

  .eia-text { font-size: 14px; line-height: 1.78; }
  .eia-text.explicar { color: #80c8a0; }
  .eia-text.ilustrar { color: #b0a0e0; }
  .eia-text.aplicar  { color: #d0a070; }

  /* Keypoints */
  .keypoints { display: flex; flex-direction: column; gap: 9px; margin-bottom: 24px; }

  .keypoint {
    display: flex; align-items: flex-start; gap: 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 13px 16px; transition: border-color 0.2s;
  }

  .keypoint:hover { border-color: var(--blue-dim); }

  .kp-n {
    flex-shrink: 0; width: 24px; height: 24px;
    background: rgba(44,95,148,0.35); border: 1.5px solid var(--blue-dim);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 10.5px; color: var(--blue-soft); font-weight: 700;
  }

  .kp-text { font-size: 13.5px; line-height: 1.6; color: var(--text); }

  .jw-link {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--blue-soft); text-decoration: none;
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 18px; background: var(--surface2); transition: all 0.2s; font-weight: 600;
  }

  .jw-link:hover { border-color: var(--blue-dim); }

  footer { margin-top: 48px; text-align: center; font-size: 12px; color: var(--muted); line-height: 1.9; }
  footer a { color: var(--blue-dim); text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">📖</div>
  <h1>SUPORTE JW</h1>
  <p class="subtitle">Pesquisa bíblica · JW.org · Aplicação diária</p>
  <div class="glow-line"></div>
</header>

<div class="container">
  <div class="search-box">
    <span class="search-label">O que você gostaria de pesquisar?</span>
    <p class="search-hint">Digite um tema (ex: ansiedade, fé) ou um texto bíblico (ex: João 3:16)</p>
    <div class="input-row">
      <input type="text" id="topicInput" placeholder="Tema ou texto bíblico…" />
      <button class="btn-buscar" id="searchBtn" onclick="pesquisar()">Buscar</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Buscando sabedoria bíblica…</p>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result-card" id="resultCard"></div>
</div>

<footer>Baseado em <a href="https://www.jw.org/pt" target="_blank">JW.org/pt</a></footer>

<script>
  const $ = id => document.getElementById(id);
  const show = (id, on) => $(id).classList.toggle('visible', on);

  $('topicInput').addEventListener('keydown', e => { if (e.key === 'Enter') pesquisar(); });

  async function pesquisar() {
    const topic = $('topicInput').value.trim();
    if (!topic) return;

    show('loading', true);
    show('resultCard', false);
    show('errorBox', false);
    $('searchBtn').disabled = true;

    try {
      const res = await fetch('/buscar', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ topic })
      });

      if (!res.ok) throw new Error(`Erro ${res.status}`);
      const obj = await res.json();
      if (obj.error) throw new Error(obj.error);

      const card = $('resultCard');

      if (obj.tipo === 'texto') {
        // Modo: Explicar, Ilustrar, Aplicar
        card.innerHTML = `
          <p class="r-eyebrow">📖 Texto Bíblico</p>
          <div class="scripture">
            <p class="scripture-text">${obj.scripture_text}</p>
            <span class="scripture-ref">${obj.scripture_ref}</span>
          </div>

          <div class="eia-box explicar">
            <p class="eia-title explicar">📘 Explicar</p>
            <p class="eia-text explicar">${obj.explicar}</p>
          </div>

          <div class="eia-box ilustrar">
            <p class="eia-title ilustrar">🖼️ Ilustrar</p>
            <p class="eia-text ilustrar">${obj.ilustrar}</p>
          </div>

          <div class="eia-box aplicar">
            <p class="eia-title aplicar">✋ Aplicar</p>
            <p class="eia-text aplicar">${obj.aplicar}</p>
          </div>

          <br>
          <a class="jw-link" href="https://www.jw.org/pt/biblioteca/?wtlocale=T&q=${encodeURIComponent(obj.jw_search || topic)}" target="_blank">
            🔗 Explorar no JW.org/pt
          </a>
        `;
      } else {
        // Modo: Tema
        const kpHtml = (obj.keypoints || []).map((t, i) =>
          `<div class="keypoint"><span class="kp-n">${i+1}</span><span class="kp-text">${t}</span></div>`
        ).join('');

        card.innerHTML = `
          <p class="r-eyebrow">📖 Tema: ${topic}</p>
          <h2 class="r-title">${obj.title}</h2>
          <div class="scripture">
            <p class="scripture-text">${obj.scripture_text}</p>
            <span class="scripture-ref">${obj.scripture_ref}</span>
          </div>
          <p class="section-label blue">Aplicação para hoje</p>
          <p class="section-text blue">${obj.application}</p>
          <p class="section-label blue">Pontos práticos</p>
          <div class="keypoints">${kpHtml}</div>
          <a class="jw-link" href="https://www.jw.org/pt/biblioteca/?wtlocale=T&q=${encodeURIComponent(obj.jw_search || topic)}" target="_blank">
            🔗 Explorar no JW.org/pt
          </a>
        `;
      }

      show('resultCard', true);

    } catch(e) {
      $('errorBox').textContent = `⚠️ Erro ao buscar. Tente novamente.`;
      show('errorBox', true);
    } finally {
      show('loading', false);
      $('searchBtn').disabled = false;
    }
  }
</script>
</body>
</html>
